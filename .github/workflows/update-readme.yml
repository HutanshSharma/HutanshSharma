name: Update README

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: HutanshSharma
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#60a5fa&color_dots=#0d1117,#1e3a8a,#2563eb,#3b82f6,#60a5fa
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#60a5fa&color_dots=#0d1117,#1e3a8a,#2563eb,#3b82f6,#60a5fa

      - name: Push snake animation to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
